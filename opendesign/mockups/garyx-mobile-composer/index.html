<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Garyx Mobile Composer Tuner</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f5f5f3;
        --ink: #050505;
        --muted: #777776;
        --panel: #ffffff;
        --line: rgba(0, 0, 0, 0.09);
        --soft: rgba(0, 0, 0, 0.055);
        --phone-w: 393px;
        --phone-h: 852px;
        --composer-radius: 22px;
        --composer-top-pad: 15px;
        --composer-min-height: 29px;
        --composer-bottom-pad: 7px;
        --composer-opacity: 0.58;
        --composer-shadow-y: 10px;
        --composer-shadow-blur: 18px;
        --apron-overlap: 20px;
        --apron-top-pad: 24px;
        --apron-bottom-pad: 5px;
        --apron-height: 24px;
        --apron-radius: 17px;
        --apron-opacity: 0.74;
        --apron-font-size: 13px;
        --apron-icon-size: 19px;
        --apron-chevron-size: 10px;
        --sheet-height: 228px;
        --sheet-radius: 38px;
        --sheet-top-pad: 20px;
        --row-height: 54px;
        --row-radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      i[data-lucide] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      i[data-lucide] svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
      }

      .app {
        display: grid;
        grid-template-columns: minmax(420px, 1fr) 380px;
        gap: 24px;
        min-height: 100vh;
        padding: 22px;
      }

      .stage {
        display: grid;
        min-width: 0;
        place-items: center;
        overflow: auto;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background:
          linear-gradient(45deg, rgba(0, 0, 0, 0.025) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(0, 0, 0, 0.025) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(0, 0, 0, 0.025) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(0, 0, 0, 0.025) 75%),
          #eeeeec;
        background-position: 0 0, 0 12px, 12px -12px, -12px 0;
        background-size: 24px 24px;
      }

      .phone {
        position: relative;
        width: var(--phone-w);
        height: var(--phone-h);
        overflow: hidden;
        border-radius: 0;
        background: #fdfdfd;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.18);
      }

      .status-bar {
        position: relative;
        z-index: 3;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        height: 60px;
        padding: 0 46px;
        font-size: 21px;
        font-weight: 650;
      }

      .dynamic-island {
        width: 124px;
        height: 36px;
        border-radius: 999px;
        background: #000;
      }

      .system-icons {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        color: #000;
      }

      .signal-dots {
        display: inline-flex;
        gap: 3px;
        margin-right: 4px;
      }

      .signal-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #b7b7b7;
      }

      .battery {
        position: relative;
        width: 28px;
        height: 14px;
        border: 2px solid #111;
        border-radius: 4px;
      }

      .battery::before {
        position: absolute;
        top: 3px;
        right: -5px;
        width: 3px;
        height: 6px;
        border-radius: 0 2px 2px 0;
        background: #111;
        content: "";
      }

      .battery::after {
        position: absolute;
        inset: 2px;
        border-radius: 2px;
        background: #111;
        content: "";
      }

      .top-chrome {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 20px 18px 0;
      }

      .menu-button {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: #101010;
        background: rgba(0, 0, 0, 0.045);
      }

      .agent-pill {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        height: 44px;
        padding: 0 14px 0 12px;
        border: 1px solid rgba(0, 0, 0, 0.055);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
        font-size: 17px;
        font-weight: 720;
      }

      .agent-avatar {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        overflow: hidden;
        border-radius: 50%;
        background: #f4f4f4;
      }

      .agent-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .empty-state {
        position: absolute;
        top: 300px;
        right: 0;
        left: 0;
        display: grid;
        justify-items: center;
        gap: 20px;
      }

      .empty-state h1 {
        margin: 0;
        font-size: 21px;
        font-weight: 760;
      }

      .workspace-pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: 100px;
        height: 48px;
        padding: 0 18px;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: #000;
        font-size: 18px;
        font-weight: 700;
      }

      .composer-area {
        position: absolute;
        right: 12px;
        bottom: 35px;
        left: 12px;
        z-index: 4;
      }

      .composer-deck {
        display: grid;
      }

      .composer-card {
        position: relative;
        z-index: 2;
        overflow: hidden;
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: var(--composer-radius);
        background: rgba(255, 255, 255, var(--composer-opacity));
        box-shadow: 0 var(--composer-shadow-y) var(--composer-shadow-blur) rgba(0, 0, 0, 0.08);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
      }

      .composer-input {
        min-height: var(--composer-min-height);
        padding: var(--composer-top-pad) 16px var(--composer-bottom-pad);
        color: #b5b5b5;
        font-size: 15px;
        line-height: 1.35;
      }

      .composer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2px 14px 7px;
      }

      .round-action {
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border: 0;
        border-radius: 50%;
        color: #111;
        background: rgba(0, 0, 0, 0.06);
      }

      .round-action.disabled {
        color: #c8c8c8;
        background: rgba(0, 0, 0, 0.035);
      }

      .local-apron {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: var(--apron-height);
        margin-top: calc(var(--apron-overlap) * -1);
        padding: var(--apron-top-pad) 14px var(--apron-bottom-pad);
        border: 1px solid rgba(0, 0, 0, 0.055);
        border-top: 0;
        border-radius: 0 0 var(--apron-radius) var(--apron-radius);
        color: rgba(0, 0, 0, 0.78);
        background: rgba(225, 225, 225, var(--apron-opacity));
        -webkit-backdrop-filter: blur(18px);
        backdrop-filter: blur(18px);
        font-size: var(--apron-font-size);
      }

      .local-apron strong {
        font-size: var(--apron-font-size);
        font-weight: 400;
      }

      .local-apron [data-lucide="laptop"] {
        width: var(--apron-icon-size) !important;
        height: var(--apron-icon-size) !important;
      }

      .local-apron [data-lucide="chevron-down"] {
        width: var(--apron-chevron-size) !important;
        height: var(--apron-chevron-size) !important;
      }

      .sheet-backdrop {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: none;
        background: rgba(0, 0, 0, 0.12);
      }

      .phone[data-state="sheet"] .sheet-backdrop {
        display: block;
      }

      .run-sheet {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        height: var(--sheet-height);
        padding: var(--sheet-top-pad) 18px 18px;
        border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
        background: #fff;
        box-shadow: 0 -18px 50px rgba(0, 0, 0, 0.08);
      }

      .drag-indicator {
        position: absolute;
        top: 12px;
        left: 50%;
        width: 36px;
        height: 5px;
        border-radius: 999px;
        background: #b8b8b8;
        transform: translateX(-50%);
      }

      .run-sheet h2 {
        margin: 0 0 16px;
        font-size: 22px;
        line-height: 1.1;
        font-weight: 760;
      }

      .mode-list {
        display: grid;
        gap: 8px;
      }

      .mode-row {
        display: flex;
        align-items: center;
        gap: 12px;
        height: var(--row-height);
        padding: 0 12px;
        border: 1px solid rgba(0, 0, 0, 0.09);
        border-radius: var(--row-radius);
        color: #111;
        background: #fff;
      }

      .mode-row.selected {
        background: rgba(118, 118, 128, 0.13);
      }

      .mode-icon {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.055);
      }

      .mode-row strong {
        font-size: 17px;
        font-weight: 720;
      }

      .mode-row .check {
        display: grid;
        width: 22px;
        height: 22px;
        margin-left: auto;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        background: #000;
      }

      .home-indicator {
        position: absolute;
        bottom: 8px;
        left: 50%;
        z-index: 8;
        width: 142px;
        height: 5px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.62);
        transform: translateX(-50%);
      }

      .controls {
        min-width: 0;
        height: calc(100vh - 44px);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
      }

      .controls-head {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 16px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
      }

      .controls h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 760;
      }

      .controls p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        margin-top: 14px;
        padding: 4px;
        border-radius: 10px;
        background: #eeeeee;
      }

      .segmented button {
        height: 34px;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: #595959;
        font-weight: 650;
      }

      .segmented button.active {
        background: #fff;
        color: #050505;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }

      .control-section {
        display: grid;
        gap: 14px;
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .control-section h2 {
        margin: 0;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #777;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        color: #1a1a1a;
        font-size: 13px;
        font-weight: 650;
      }

      .field output {
        color: #737373;
        font-variant-numeric: tabular-nums;
        font-weight: 560;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #111;
      }

      textarea {
        width: 100%;
        min-height: 156px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8f8f8;
        color: #111;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        resize: vertical;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .action-button {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #111;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
      }

      .action-button.secondary {
        background: #fff;
        color: #111;
      }

      .hint {
        padding: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 10px;
        background: #f7f7f6;
        color: #666;
        font-size: 12px;
        line-height: 1.5;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }

        .controls {
          height: auto;
        }

        .stage {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="手机预览">
        <div class="phone" id="phone" data-state="composer">
          <div class="status-bar">
            <div>13:30</div>
            <div class="dynamic-island" aria-hidden="true"></div>
            <div class="system-icons" aria-hidden="true">
              <span class="signal-dots"><span></span><span></span><span></span><span></span></span>
              <i data-lucide="wifi" style="width: 22px; height: 22px;"></i>
              <span class="battery"></span>
            </div>
          </div>

          <div class="top-chrome">
            <button class="menu-button" type="button" aria-label="Menu">
              <i data-lucide="menu" style="width: 22px; height: 22px;"></i>
            </button>
            <button class="agent-pill" type="button">
              <span class="agent-avatar" aria-hidden="true">
                <img src="garyx-avatar.png" alt="" />
              </span>
              <span>Claude</span>
              <i data-lucide="chevron-down" style="width: 17px; height: 17px; color: #aaa;"></i>
            </button>
          </div>

          <div class="empty-state">
            <h1>New Thread</h1>
            <button class="workspace-pill" type="button">
              <span>Garyx</span>
              <i data-lucide="chevrons-up-down" style="width: 17px; height: 17px;"></i>
            </button>
          </div>

          <div class="composer-area">
            <div class="composer-deck">
              <div class="composer-card">
                <div class="composer-input">Ask Garyx anything...</div>
                <div class="composer-actions">
                  <button class="round-action" type="button" aria-label="Attach">
                    <i data-lucide="plus" style="width: 23px; height: 23px;"></i>
                  </button>
                  <button class="round-action disabled" type="button" aria-label="Send">
                    <i data-lucide="arrow-up" style="width: 19px; height: 19px;"></i>
                  </button>
                </div>
              </div>
              <button class="local-apron" type="button">
                <i data-lucide="laptop"></i>
                <strong>Local</strong>
                <i data-lucide="chevron-down"></i>
              </button>
            </div>
          </div>

          <div class="sheet-backdrop">
            <div class="run-sheet">
              <span class="drag-indicator"></span>
              <h2>Run Location</h2>
              <div class="mode-list">
                <div class="mode-row selected">
                  <span class="mode-icon"><i data-lucide="laptop" style="width: 22px; height: 22px;"></i></span>
                  <strong>Local</strong>
                  <span class="check"><i data-lucide="check" style="width: 16px; height: 16px;"></i></span>
                </div>
                <div class="mode-row">
                  <span class="mode-icon"><i data-lucide="git-fork" style="width: 21px; height: 21px;"></i></span>
                  <strong>WorkTree</strong>
                </div>
              </div>
            </div>
          </div>

          <span class="home-indicator" aria-hidden="true"></span>
        </div>
      </section>

      <aside class="controls" aria-label="调参控制台">
        <div class="controls-head">
          <h1>Composer Tuner</h1>
          <p>先在网页里把输入框和 Local 围裙调到对，再迁回 iOS SwiftUI。</p>
          <div class="segmented" role="tablist" aria-label="预览状态">
            <button class="active" type="button" data-preview-state="composer">Composer</button>
            <button type="button" data-preview-state="sheet">Run Sheet</button>
          </div>
        </div>

        <section class="control-section">
          <h2>Composer</h2>
          <div class="field">
            <label>圆角 <output data-for="--composer-radius"></output></label>
            <input type="range" min="14" max="34" step="1" data-var="--composer-radius" data-unit="px" />
          </div>
          <div class="field">
            <label>顶部内边距 <output data-for="--composer-top-pad"></output></label>
            <input type="range" min="8" max="30" step="1" data-var="--composer-top-pad" data-unit="px" />
          </div>
          <div class="field">
            <label>输入区最小高度 <output data-for="--composer-min-height"></output></label>
            <input type="range" min="20" max="58" step="1" data-var="--composer-min-height" data-unit="px" />
          </div>
          <div class="field">
            <label>底部内边距 <output data-for="--composer-bottom-pad"></output></label>
            <input type="range" min="0" max="22" step="1" data-var="--composer-bottom-pad" data-unit="px" />
          </div>
          <div class="field">
            <label>玻璃白度 <output data-for="--composer-opacity"></output></label>
            <input type="range" min="0.30" max="0.95" step="0.01" data-var="--composer-opacity" />
          </div>
          <div class="field">
            <label>阴影 Y <output data-for="--composer-shadow-y"></output></label>
            <input type="range" min="0" max="28" step="1" data-var="--composer-shadow-y" data-unit="px" />
          </div>
          <div class="field">
            <label>阴影模糊 <output data-for="--composer-shadow-blur"></output></label>
            <input type="range" min="0" max="42" step="1" data-var="--composer-shadow-blur" data-unit="px" />
          </div>
        </section>

        <section class="control-section">
          <h2>Local 围裙</h2>
          <div class="field">
            <label>重叠量 <output data-for="--apron-overlap"></output></label>
            <input type="range" min="0" max="44" step="1" data-var="--apron-overlap" data-unit="px" />
          </div>
          <div class="field">
            <label>顶部露出 <output data-for="--apron-top-pad"></output></label>
            <input type="range" min="14" max="54" step="1" data-var="--apron-top-pad" data-unit="px" />
          </div>
          <div class="field">
            <label>底部内边距 <output data-for="--apron-bottom-pad"></output></label>
            <input type="range" min="0" max="24" step="1" data-var="--apron-bottom-pad" data-unit="px" />
          </div>
          <div class="field">
            <label>行高 <output data-for="--apron-height"></output></label>
            <input type="range" min="20" max="48" step="1" data-var="--apron-height" data-unit="px" />
          </div>
          <div class="field">
            <label>底部圆角 <output data-for="--apron-radius"></output></label>
            <input type="range" min="10" max="32" step="1" data-var="--apron-radius" data-unit="px" />
          </div>
          <div class="field">
            <label>灰底强度 <output data-for="--apron-opacity"></output></label>
            <input type="range" min="0.25" max="0.95" step="0.01" data-var="--apron-opacity" />
          </div>
          <div class="field">
            <label>文字大小 <output data-for="--apron-font-size"></output></label>
            <input type="range" min="11" max="17" step="1" data-var="--apron-font-size" data-unit="px" />
          </div>
          <div class="field">
            <label>电脑图标 <output data-for="--apron-icon-size"></output></label>
            <input type="range" min="14" max="24" step="1" data-var="--apron-icon-size" data-unit="px" />
          </div>
          <div class="field">
            <label>箭头图标 <output data-for="--apron-chevron-size"></output></label>
            <input type="range" min="10" max="18" step="1" data-var="--apron-chevron-size" data-unit="px" />
          </div>
        </section>

        <section class="control-section">
          <h2>Run Location Sheet</h2>
          <div class="field">
            <label>Sheet 高度 <output data-for="--sheet-height"></output></label>
            <input type="range" min="180" max="370" step="1" data-var="--sheet-height" data-unit="px" />
          </div>
          <div class="field">
            <label>Sheet 圆角 <output data-for="--sheet-radius"></output></label>
            <input type="range" min="18" max="48" step="1" data-var="--sheet-radius" data-unit="px" />
          </div>
          <div class="field">
            <label>标题顶部距离 <output data-for="--sheet-top-pad"></output></label>
            <input type="range" min="16" max="54" step="1" data-var="--sheet-top-pad" data-unit="px" />
          </div>
          <div class="field">
            <label>选项行高 <output data-for="--row-height"></output></label>
            <input type="range" min="44" max="74" step="1" data-var="--row-height" data-unit="px" />
          </div>
          <div class="field">
            <label>选项圆角 <output data-for="--row-radius"></output></label>
            <input type="range" min="8" max="26" step="1" data-var="--row-radius" data-unit="px" />
          </div>
        </section>

        <section class="control-section">
          <h2>Export</h2>
          <textarea id="export" readonly></textarea>
          <div class="actions">
            <button class="action-button" type="button" id="copy">复制常量</button>
            <button class="action-button secondary" type="button" id="reset">重置</button>
          </div>
          <div class="hint">
            这只是网页调参板。iOS 迁移时会把这些值映射回 `GaryxComposerLayout`，再按 SwiftUI 实机表现微调。
          </div>
        </section>
      </aside>
    </main>

    <script>
      const iconPaths = {
        "arrow-up": '<path d="m5 12 7-7 7 7"></path><path d="M12 19V5"></path>',
        check: '<path d="M20 6 9 17l-5-5"></path>',
        "chevron-down": '<path d="m6 9 6 6 6-6"></path>',
        "chevrons-up-down": '<path d="m7 15 5 5 5-5"></path><path d="m7 9 5-5 5 5"></path>',
        "git-fork": '<circle cx="6" cy="6" r="3"></circle><circle cx="18" cy="6" r="3"></circle><circle cx="12" cy="18" r="3"></circle><path d="M6 9v2a2 2 0 0 0 2 2h4"></path><path d="M18 9v2a2 2 0 0 1-2 2h-4"></path><path d="M12 13v5"></path>',
        laptop: '<path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9"></path><path d="M2 20h20"></path><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2"></path>',
        menu: '<path d="M4 12h16"></path><path d="M4 6h16"></path><path d="M4 18h16"></path>',
        plus: '<path d="M5 12h14"></path><path d="M12 5v14"></path>',
        wifi: '<path d="M12 20h.01"></path><path d="M8.5 16.429a5 5 0 0 1 7 0"></path><path d="M5 12.859a10 10 0 0 1 14 0"></path><path d="M2 8.82a15 15 0 0 1 20 0"></path>'
      };

      function createIcons() {
        for (const icon of document.querySelectorAll("i[data-lucide]")) {
          const name = icon.dataset.lucide;
          const paths = iconPaths[name];
          if (!paths) continue;
          icon.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths}</svg>`;
        }
      }

      const root = document.documentElement;
      const phone = document.querySelector("#phone");
      const exportBox = document.querySelector("#export");
      const controls = Array.from(document.querySelectorAll("[data-var]"));
      const defaults = {};
      const storagePrefix = "garyx-composer-tuner:";
      const storageVersionKey = `${storagePrefix}version`;
      const storageVersion = "apron-shorter-2026-06-04";

      if (localStorage.getItem(storageVersionKey) !== storageVersion) {
        for (const key of Object.keys(localStorage)) {
          if (key.startsWith(storagePrefix)) {
            localStorage.removeItem(key);
          }
        }
        localStorage.setItem(storageVersionKey, storageVersion);
      }

      for (const input of controls) {
        const key = input.dataset.var;
        const computed = getComputedStyle(root).getPropertyValue(key).trim();
        defaults[key] = computed;
        const unit = input.dataset.unit || "";
        input.value = unit ? computed.replace(unit, "") : computed;
        input.addEventListener("input", () => setVar(key, input.value, unit));
      }

      function setVar(key, value, unit) {
        root.style.setProperty(key, `${value}${unit}`);
        localStorage.setItem(`${storagePrefix}${key}`, `${value}${unit}`);
        updateOutputs();
      }

      function restoreSavedValues() {
        for (const input of controls) {
          const key = input.dataset.var;
          const unit = input.dataset.unit || "";
          const saved = localStorage.getItem(`${storagePrefix}${key}`);
          if (!saved) continue;
          root.style.setProperty(key, saved);
          input.value = unit ? saved.replace(unit, "") : saved;
        }
      }

      function updateOutputs() {
        for (const output of document.querySelectorAll("output[data-for]")) {
          const key = output.dataset.for;
          output.textContent = getComputedStyle(root).getPropertyValue(key).trim();
        }
        exportBox.value = swiftConstants();
      }

      function swiftConstants() {
        const css = getComputedStyle(root);
        const value = (key) => css.getPropertyValue(key).trim();
        const number = (key) => value(key).replace("px", "");
        return [
          "private enum GaryxComposerLayout {",
          `    static let composerCornerRadius: CGFloat = ${number("--composer-radius")}`,
          `    static let inputTopPadding: CGFloat = ${number("--composer-top-pad")}`,
          `    static let inputBottomPadding: CGFloat = ${number("--composer-bottom-pad")}`,
          `    static let inputMinHeight: CGFloat = ${number("--composer-min-height")}`,
          `    static let composerMaterialTint = Color(.systemBackground).opacity(${value("--composer-opacity")})`,
          `    static let workspaceBaseOverlap: CGFloat = ${number("--apron-overlap")}`,
          `    static let workspaceBaseTopPadding: CGFloat = ${number("--apron-top-pad")}`,
          `    static let workspaceBaseBottomPadding: CGFloat = ${number("--apron-bottom-pad")}`,
          `    static let workspaceBaseCornerRadius: CGFloat = ${number("--apron-radius")}`,
          `    static let workspaceStripHeight: CGFloat = ${number("--apron-height")}`,
          `    static let workspaceBaseFill = Color(.systemFill).opacity(${value("--apron-opacity")})`,
          `    static let workspaceSheetHeight: CGFloat = ${number("--sheet-height")}`,
          "}"
        ].join("\\n");
      }

      document.querySelectorAll("[data-preview-state]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-preview-state]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          phone.dataset.state = button.dataset.previewState;
        });
      });

      document.querySelector("#copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(exportBox.value);
      });

      document.querySelector("#reset").addEventListener("click", () => {
        for (const [key, value] of Object.entries(defaults)) {
          root.style.setProperty(key, value);
          localStorage.removeItem(`${storagePrefix}${key}`);
        }
        for (const input of controls) {
          const key = input.dataset.var;
          const unit = input.dataset.unit || "";
          const value = getComputedStyle(root).getPropertyValue(key).trim();
          input.value = unit ? value.replace(unit, "") : value;
        }
        updateOutputs();
      });

      restoreSavedValues();
      updateOutputs();
      createIcons();
    </script>
  </body>
</html>
