<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>松间小铺 | 店铺服务表单</title>
    <style>:root{color-scheme:light;--ink:#16201d;--muted:#65726e;--line:#dce4df;--paper:#fbfcf8;--surface:#ffffff;--field:#f3f7f1;--green:#1f6f55;--green-dark:#164b3c;--coral:#e66f5c;--gold:#f0bd4d;--blue:#315f8f;--shadow:0 24px 70px rgba(19,35,30,0.12);}*{box-sizing:border-box;}html{background:var(--paper);}body{margin:0;min-height:100vh;color:var(--ink);font-family:Avenir Next,Gill Sans,Noto Sans SC,Helvetica Neue,sans-serif;letter-spacing:0;background:linear-gradient(180deg,rgba(31,111,85,0.08),rgba(251,252,248,0) 360px),var(--paper);}button,input,select,textarea{font:inherit;}a{color:inherit;}.page{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:24px 0 40px;}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:64px;}.brand{display:flex;align-items:center;gap:12px;min-width:0;}.mark{display:grid;width:44px;height:44px;place-items:center;border:1px solid rgba(31,111,85,0.22);border-radius:8px;color:var(--paper);font-family:Georgia,serif;font-size:20px;font-weight:700;background:var(--green-dark);}.brand strong{display:block;font-family:Georgia,Noto Serif SC,serif;font-size:21px;line-height:1.1;}.brand span{display:block;margin-top:4px;color:var(--muted);font-size:13px;}.top-actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:10px;}.button{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 16px;border:1px solid var(--line);border-radius:8px;color:var(--ink);background:var(--surface);cursor:pointer;transition:transform 160ms ease,border-color 160ms ease,background 160ms ease;}.button:hover{transform:translateY(-1px);border-color:rgba(31,111,85,0.32);}.button.primary{border-color:var(--green);color:white;background:var(--green);}.button.primary:hover{background:var(--green-dark);}.button-icon{position:relative;width:16px;height:16px;flex:0 0 16px;}.button-icon.refresh::before,.button-icon.refresh::after{position:absolute;content:"";}.button-icon.refresh::before{inset:2px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;}.button-icon.refresh::after{top:0;right:1px;width:6px;height:6px;border-top:2px solid currentColor;border-right:2px solid currentColor;transform:rotate(22deg);}.button-icon.send::before{position:absolute;top:2px;left:1px;width:13px;height:13px;content:"";clip-path:polygon(0 0,100% 50%,0 100%,18% 55%,58% 50%,18% 45%);background:currentColor;}.intro{display:grid;grid-template-columns:1.02fr 0.98fr;gap:28px;align-items:end;padding:36px 0 28px;}.intro-copy h1{max-width:740px;margin:0;font-family:Georgia,Noto Serif SC,serif;font-size:56px;line-height:1;font-weight:700;overflow-wrap:anywhere;}.intro-copy p{max-width:620px;margin:18px 0 0;color:var(--muted);font-size:18px;line-height:1.65;overflow-wrap:anywhere;}.status-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--line);}.status-strip div{min-height:88px;padding:16px;background:rgba(255,255,255,0.72);}.status-strip strong{display:block;font-size:24px;}.status-strip span{display:block;margin-top:7px;color:var(--muted);font-size:13px;}.workspace{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:22px;align-items:start;}.form-panel,.summary-panel{border:1px solid var(--line);border-radius:8px;background:var(--surface);box-shadow:var(--shadow);}.form-panel{padding:26px;}.summary-panel{position:sticky;top:18px;overflow:hidden;}.panel-head{display:flex;align-items:start;justify-content:space-between;gap:16px;margin-bottom:22px;}.panel-head h2{margin:0;font-size:24px;line-height:1.2;overflow-wrap:anywhere;}.panel-head p{margin:7px 0 0;color:var(--muted);line-height:1.5;overflow-wrap:anywhere;}.badge{display:inline-flex;align-items:center;min-height:30px;padding:0 10px;border-radius:999px;color:var(--green-dark);font-size:13px;font-weight:700;background:rgba(31,111,85,0.11);white-space:nowrap;}.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;}.field{display:flex;min-width:0;flex-direction:column;gap:8px;}.field.full{grid-column:1 / -1;}label,legend{color:var(--green-dark);font-size:13px;font-weight:800;}input,select,textarea{width:100%;min-height:46px;border:1px solid transparent;border-radius:8px;color:var(--ink);background:var(--field);outline:none;transition:border-color 160ms ease,box-shadow 160ms ease,background 160ms ease;}input,select{padding:0 13px;}textarea{min-height:112px;resize:vertical;padding:13px;line-height:1.5;}input:focus,select:focus,textarea:focus{border-color:rgba(31,111,85,0.58);background:#ffffff;box-shadow:0 0 0 4px rgba(31,111,85,0.12);}.section-divider{height:1px;margin:24px 0;background:var(--line);}fieldset{min-width:0;margin:0;padding:0;border:0;}.choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:10px;}.choice{position:relative;display:grid;min-height:88px;padding:14px 14px 14px 46px;border:1px solid var(--line);border-radius:8px;background:#ffffff;cursor:pointer;}.choice input{position:absolute;top:18px;left:15px;width:18px;min-height:18px;accent-color:var(--green);}.choice strong{font-size:15px;}.choice span{margin-top:5px;color:var(--muted);font-size:13px;line-height:1.4;}.choice:has(input:checked){border-color:rgba(31,111,85,0.62);background:rgba(31,111,85,0.07);}.product-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:10px;}.product{position:relative;overflow:hidden;min-height:164px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;}.product img{display:block;width:100%;height:88px;object-fit:cover;background:#dce4df;}.product input{position:absolute;top:10px;left:10px;width:20px;min-height:20px;accent-color:var(--green);}.product-text{display:grid;gap:4px;padding:12px;}.product-text strong{font-size:14px;}.product-text span{color:var(--muted);font-size:13px;}.product:has(input:checked){border-color:var(--green);box-shadow:inset 0 0 0 1px var(--green);}.slider-row{display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:14px;align-items:center;}input[type="range"]{padding:0;accent-color:var(--coral);background:transparent;}.budget-value{display:grid;min-height:46px;place-items:center;border:1px solid var(--line);border-radius:8px;color:var(--blue);font-weight:800;background:rgba(49,95,143,0.08);}.consent{display:flex;gap:10px;align-items:start;color:var(--muted);line-height:1.45;}.consent input{width:18px;min-height:18px;margin-top:2px;accent-color:var(--green);}.form-actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:12px;margin-top:24px;}.summary-hero{position:relative;height:190px;background-image:linear-gradient(180deg,rgba(22,32,29,0.1),rgba(22,32,29,0.54)),url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1200&q=80");background-position:center;background-size:cover;}.summary-hero-text{position:absolute;right:18px;bottom:18px;left:18px;color:white;}.summary-hero-text strong{display:block;font-family:Georgia,Noto Serif SC,serif;font-size:30px;line-height:1;}.summary-hero-text span{display:block;margin-top:8px;color:rgba(255,255,255,0.82);font-size:13px;}.summary-body{display:grid;gap:18px;padding:20px;}.summary-line{display:flex;justify-content:space-between;gap:18px;padding-bottom:13px;border-bottom:1px solid var(--line);}.summary-line span{color:var(--muted);}.summary-line strong{text-align:right;}.mini-products{display:grid;gap:10px;}.mini-products img{width:54px;height:54px;border-radius:8px;object-fit:cover;}.mini-row{display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:center;}.mini-row strong{display:block;font-size:14px;}.mini-row span{display:block;margin-top:2px;color:var(--muted);font-size:12px;}.mini-row b{color:var(--green-dark);font-size:14px;}.empty-note{padding:14px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);background:rgba(240,189,77,0.12);}.total-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:60px;padding:0 16px;border-radius:8px;color:white;background:var(--green-dark);}.total-row span{color:rgba(255,255,255,0.74);}.total-row strong{font-size:24px;}.fine-print{color:var(--muted);font-size:12px;line-height:1.5;}.toast{position:fixed;right:22px;bottom:22px;z-index:10;max-width:min(360px,calc(100% - 44px));padding:16px 18px;border:1px solid rgba(31,111,85,0.24);border-radius:8px;color:var(--green-dark);background:#ffffff;box-shadow:var(--shadow);transform:translateY(18px);opacity:0;pointer-events:none;transition:opacity 180ms ease,transform 180ms ease;}.toast.show{transform:translateY(0);opacity:1;}@media (max-width:980px){.intro,.workspace{grid-template-columns:1fr;}.intro-copy h1{font-size:44px;}.summary-panel{position:static;}}@media (max-width:720px){.page{width:min(100% - 20px,1180px);padding-top:12px;}.intro-copy,.panel-head>div{min-width:0;}.topbar,.panel-head{align-items:stretch;flex-direction:column;}.top-actions,.form-actions{justify-content:stretch;}.button{width:100%;}.intro{padding-top:24px;}.intro-copy h1{font-size:34px;}.intro-copy p{font-size:16px;}.intro-copy p,.panel-head p,.fine-print{word-break:break-all;}.status-strip,.field-grid,.choice-grid,.product-grid{grid-template-columns:1fr;}.form-panel{padding:18px;}.slider-row{grid-template-columns:1fr;}}</style>
  </head>
  <body>
    <main class="page">
      <header class="topbar" aria-label="页面顶部">
        <div class="brand">
          <div class="mark" aria-hidden="true">松</div>
          <div>
            <strong>松间小铺</strong>
            <span>社区咖啡、轻食与手作礼盒</span>
          </div>
        </div>
        <div class="top-actions">
          <button class="button" type="button" id="randomize">
            <span class="button-icon refresh" aria-hidden="true"></span>
            随机填充
          </button>
          <a class="button" href="#store-form">填写表单</a>
        </div>
      </header>

      <section class="intro" aria-labelledby="page-title">
        <div class="intro-copy">
          <h1 id="page-title">店铺订单与服务申请表</h1>
          <p>
            处理自取、配送、包场、礼盒定制。默认是随机示例，可替换为真实业务字段。
          </p>
        </div>
        <div class="status-strip" aria-label="今日店铺状态">
          <div>
            <strong>18:30</strong>
            <span>今日最晚确认时间</span>
          </div>
          <div>
            <strong>6 款</strong>
            <span>可选商品组合</span>
          </div>
          <div>
            <strong>24h</strong>
            <span>预计处理周期</span>
          </div>
        </div>
      </section>

      <section class="workspace">
        <form class="form-panel" id="store-form">
          <div class="panel-head">
            <div>
              <h2>填写申请</h2>
              <p>店员按提交时间处理。联系方式均为占位内容。</p>
            </div>
            <span class="badge">测试表单</span>
          </div>

          <div class="field-grid">
            <div class="field">
              <label for="customerName">称呼</label>
              <input id="customerName" name="customerName" value="测试顾客" autocomplete="name" required />
            </div>
            <div class="field">
              <label for="phone">联系电话</label>
              <input id="phone" name="phone" value="1000000001" inputmode="tel" required />
            </div>
            <div class="field">
              <label for="email">邮箱</label>
              <input id="email" name="email" type="email" value="customer@example.com" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="date">期望日期</label>
              <input id="date" name="date" type="date" required />
            </div>
            <div class="field full">
              <label for="address">配送或活动地址</label>
              <input id="address" name="address" value="示例路 100 号" required />
            </div>
          </div>

          <div class="section-divider"></div>

          <fieldset>
            <legend>服务类型</legend>
            <div class="choice-grid">
              <label class="choice">
                <input type="radio" name="service" value="到店自取订单" checked />
                <strong>到店自取订单</strong>
                <span>适合咖啡、轻食、当日小批量商品。</span>
              </label>
              <label class="choice">
                <input type="radio" name="service" value="同城配送订单" />
                <strong>同城配送订单</strong>
                <span>适合礼盒、花束、常温烘焙商品。</span>
              </label>
              <label class="choice">
                <input type="radio" name="service" value="活动包场申请" />
                <strong>活动包场申请</strong>
                <span>适合读书会、品牌快闪、小型分享会。</span>
              </label>
              <label class="choice">
                <input type="radio" name="service" value="企业礼盒定制" />
                <strong>企业礼盒定制</strong>
                <span>适合节日福利、客户拜访、会议茶歇。</span>
              </label>
            </div>
          </fieldset>

          <div class="section-divider"></div>

          <fieldset>
            <legend>商品选择</legend>
            <div class="product-grid">
              <label class="product">
                <input type="checkbox" name="product" value="手冲咖啡豆" data-price="88" checked />
                <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&amp;fit=crop&amp;w=900&amp;q=80" alt="手冲咖啡豆" />
                <span class="product-text">
                  <strong>手冲咖啡豆</strong>
                  <span>¥88 / 袋</span>
                </span>
              </label>
              <label class="product">
                <input type="checkbox" name="product" value="季节果酱礼盒" data-price="128" />
                <img src="https://images.unsplash.com/photo-1601493700631-2b16ec4b4716?auto=format&amp;fit=crop&amp;w=900&amp;q=80" alt="季节果酱礼盒" />
                <span class="product-text">
                  <strong>季节果酱礼盒</strong>
                  <span>¥128 / 组</span>
                </span>
              </label>
              <label class="product">
                <input type="checkbox" name="product" value="午后茶歇盒" data-price="168" checked />
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&amp;fit=crop&amp;w=900&amp;q=80" alt="午后茶歇盒" />
                <span class="product-text">
                  <strong>午后茶歇盒</strong>
                  <span>¥168 / 份</span>
                </span>
              </label>
            </div>
          </fieldset>

          <div class="section-divider"></div>

          <div class="field-grid">
            <div class="field">
              <label for="delivery">交付方式</label>
              <select id="delivery" name="delivery">
                <option>到店自取</option>
                <option>同城配送</option>
                <option>店员电话确认</option>
                <option>活动当天布置</option>
              </select>
            </div>
            <div class="field">
              <label for="timeSlot">时间段</label>
              <select id="timeSlot" name="timeSlot">
                <option>10:00 - 12:00</option>
                <option>13:00 - 15:00</option>
                <option>15:00 - 17:00</option>
                <option>17:00 - 19:00</option>
              </select>
            </div>
            <div class="field full">
              <label for="budget">预算上限</label>
              <div class="slider-row">
                <input id="budget" name="budget" type="range" min="100" max="2000" step="50" value="500" />
                <output class="budget-value" id="budgetValue" for="budget">¥500</output>
              </div>
            </div>
            <div class="field full">
              <label for="notes">备注</label>
              <textarea id="notes" name="notes">请尽量使用少糖选项，礼盒外包装使用中性配色。</textarea>
            </div>
          </div>

          <div class="section-divider"></div>

          <label class="consent">
            <input type="checkbox" required checked />
            <span>我确认以上内容为测试提交，并同意店铺用占位联系方式进行模拟处理。</span>
          </label>

          <div class="form-actions">
            <button class="button" type="reset">清空</button>
            <button class="button primary" type="submit">
              <span class="button-icon send" aria-hidden="true"></span>
              提交申请
            </button>
          </div>
        </form>

        <aside class="summary-panel" aria-label="申请摘要">
          <div class="summary-hero">
            <div class="summary-hero-text">
              <strong>今日可接单</strong>
              <span>咖啡、轻食、礼盒、活动支持</span>
            </div>
          </div>
          <div class="summary-body">
            <div class="summary-line">
              <span>服务</span>
              <strong id="summaryService">到店自取订单</strong>
            </div>
            <div class="summary-line">
              <span>交付</span>
              <strong id="summaryDelivery">到店自取</strong>
            </div>
            <div class="summary-line">
              <span>日期</span>
              <strong id="summaryDate">待选择</strong>
            </div>

            <div class="mini-products" id="summaryProducts"></div>

            <div class="total-row">
              <span>预估小计</span>
              <strong id="summaryTotal">¥0</strong>
            </div>

            <p class="fine-print">
              当前页面仅生成前端模拟结果。接入真实业务时，可把提交动作替换为 API 请求或低代码表单回调。
            </p>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
const form = document.querySelector("#store-form");
const budget = document.querySelector("#budget");
const budgetValue = document.querySelector("#budgetValue");
const summaryService = document.querySelector("#summaryService");
const summaryDelivery = document.querySelector("#summaryDelivery");
const summaryDate = document.querySelector("#summaryDate");
const summaryProducts = document.querySelector("#summaryProducts");
const summaryTotal = document.querySelector("#summaryTotal");
const randomize = document.querySelector("#randomize");
const toast = document.querySelector("#toast");

const samples = [
  {
    name: "测试顾客",
    phone: "1000000001",
    email: "customer@example.com",
    address: "示例路 100 号",
    service: "企业礼盒定制",
    delivery: "店员电话确认",
    timeSlot: "13:00 - 15:00",
    budget: 900,
    notes: "礼盒需要中性包装，每份附一张空白卡片。",
    products: ["季节果酱礼盒", "手冲咖啡豆"]
  },
  {
    name: "试用联系人",
    phone: "1000000002",
    email: "demo@example.com",
    address: "测试街区 12 栋",
    service: "活动包场申请",
    delivery: "活动当天布置",
    timeSlot: "17:00 - 19:00",
    budget: 1500,
    notes: "预计 16 人，现场需要一张长桌和无咖啡因饮品。",
    products: ["午后茶歇盒", "季节果酱礼盒"]
  },
  {
    name: "样例会员",
    phone: "1000000003",
    email: "member@example.com",
    address: "占位大道 8 号",
    service: "到店自取订单",
    delivery: "到店自取",
    timeSlot: "10:00 - 12:00",
    budget: 350,
    notes: "请预留两份低糖甜品，到店后出示测试编号。",
    products: ["手冲咖啡豆", "午后茶歇盒"]
  }
];

const productImages = {
  手冲咖啡豆: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=240&q=80",
  季节果酱礼盒: "https://images.unsplash.com/photo-1601493700631-2b16ec4b4716?auto=format&amp;fit=crop&amp;w=240&amp;q=80",
  午后茶歇盒: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=240&q=80"
};

function formatCurrency(value) {
  return `¥${Number(value).toLocaleString("zh-CN")}`;
}

function selectedProducts() {
  return [...form.querySelectorAll('input[name="product"]:checked')].map((input) => ({
    name: input.value,
    price: Number(input.dataset.price)
  }));
}

function updateSummary() {
  const data = new FormData(form);
  const products = selectedProducts();
  const subtotal = products.reduce((sum, product) => sum + product.price, 0);
  summaryService.textContent = data.get("service") || "待选择";
  summaryDelivery.textContent = data.get("delivery") || "待选择";
  summaryDate.textContent = data.get("date") || "待选择";
  budgetValue.textContent = formatCurrency(budget.value);
  summaryTotal.textContent = formatCurrency(subtotal);

  if (!products.length) {
    summaryProducts.innerHTML = '<div class="empty-note">还没有选择商品。</div>';
    return;
  }

  summaryProducts.innerHTML = products
    .map(
      (product) => `
        <div class="mini-row">
          <img src="${productImages[product.name]}" alt="${product.name}" />
          <span>
            <strong>${product.name}</strong>
            <span>单项预估</span>
          </span>
          <b>${formatCurrency(product.price)}</b>
        </div>
      `
    )
    .join("");
}

function setValue(selector, value) {
  const field = form.querySelector(selector);
  if (field) field.value = value;
}

function applySample(sample) {
  setValue("#customerName", sample.name);
  setValue("#phone", sample.phone);
  setValue("#email", sample.email);
  setValue("#address", sample.address);
  setValue("#delivery", sample.delivery);
  setValue("#timeSlot", sample.timeSlot);
  setValue("#budget", sample.budget);
  setValue("#notes", sample.notes);

  form.querySelectorAll('input[name="service"]').forEach((input) => {
    input.checked = input.value === sample.service;
  });

  form.querySelectorAll('input[name="product"]').forEach((input) => {
    input.checked = sample.products.includes(input.value);
  });

  updateSummary();
}

function setDefaultDate() {
  const date = new Date();
  date.setDate(date.getDate() + 2);
  form.querySelector("#date").value = date.toISOString().slice(0, 10);
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("show");
  window.setTimeout(() => toast.classList.remove("show"), 3600);
}

randomize.addEventListener("click", () => {
  const sample = samples[Math.floor(Math.random() * samples.length)];
  applySample(sample);
  showToast("已填入一组随机测试内容。");
});

form.addEventListener("input", updateSummary);
form.addEventListener("change", updateSummary);
form.addEventListener("reset", () => {
  window.setTimeout(() => {
    setDefaultDate();
    updateSummary();
  });
});

form.addEventListener("submit", (event) => {
  event.preventDefault();
  const id = `SF-${Math.floor(100000 + Math.random() * 900000)}`;
  showToast(`申请已生成：${id}。`);
});

setDefaultDate();
updateSummary();
    </script>
  </body>
</html>
