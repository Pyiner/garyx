name: GaryxMobile
options:
  bundleIdPrefix: com.garyx
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
targets:
  GaryxMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/GaryxMobile
        excludes:
          - Assets.xcassets
      - path: Sources/GaryxMobileCore
    resources:
      - path: App/GaryxMobile/PrivacyInfo.xcprivacy
    postBuildScripts:
      - name: Copy App Icons
        inputFiles:
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-20@2x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-20@3x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-29@2x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-29@3x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-40@2x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-40@3x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-60@2x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-60@3x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-76@1x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-76@2x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-83.5@2x.png
          - $(SRCROOT)/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset/icon-1024.png
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-20@2x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-20@3x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-29@2x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-29@3x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-40@2x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-40@3x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-60@2x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-60@3x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-76@1x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-76@2x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-83.5@2x.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/icon-1024.png
        script: |
          set -euo pipefail
          icon_dir="$SRCROOT/App/GaryxMobile/Assets.xcassets/AppIcon.appiconset"
          resources_dir="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp "$icon_dir"/icon-*.png "$resources_dir"/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile
        PRODUCT_NAME: Gary X
        INFOPLIST_FILE: App/GaryxMobile/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
