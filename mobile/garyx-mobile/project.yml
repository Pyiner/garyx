name: GaryxMobile
options:
  bundleIdPrefix: com.garyx
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
targets:
  GaryxMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/GaryxMobile
      - path: Sources/GaryxMobileCore
    resources:
      - App/GaryxMobile/Assets.xcassets
      - App/GaryxMobile/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile
        PRODUCT_NAME: Gary X
        INFOPLIST_FILE: App/GaryxMobile/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
