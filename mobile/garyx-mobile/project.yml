name: GaryxMobile
options:
  bundleIdPrefix: com.garyx
  deploymentTarget:
    iOS: "26.0"
configs:
  Debug: debug
  Release: release
  Performance: release
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
schemes:
  GaryxMobile:
    build:
      targets:
        GaryxMobile: all
        GaryxMobileTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GaryxMobileTests
  GaryxMobileScrollPerformance:
    build:
      targets:
        GaryxMobile: all
        GaryxMobileUITests: [test]
    test:
      # Frame budgets must exercise Release code generation. DEBUG remains an
      # active compilation condition only in this non-shipping configuration
      # so the deterministic UI-test snapshot and probes stay available.
      config: Performance
      targets:
        - GaryxMobileUITests
  GaryxMobileFluidRoutes:
    build:
      targets:
        GaryxMobile: all
        GaryxMobileUITests: [test]
    test:
      config: Debug
      targets:
        - GaryxMobileUITests
targets:
  GaryxMobile:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/GaryxMobile
      - path: Sources/GaryxMobileCore
      # Shared speedometer gauge (widget visual reused by the provider-page
      # Quota hero); the file lives in the widget tree and is compiled into
      # both targets.
      - path: Widget/GaryxRecentThreadsWidget/GaryxUsageGaugeView.swift
    dependencies:
      - target: GaryxRecentThreadsWidget
        embed: true
    resources:
      - App/GaryxMobile/Assets.xcassets
      - App/GaryxMobile/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile
        PRODUCT_NAME: Gary X
        PRODUCT_MODULE_NAME: GaryxMobile
        INFOPLIST_FILE: App/GaryxMobile/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/GaryxMobile/GaryxMobile.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          APS_ENVIRONMENT: development
          CODE_SIGN_IDENTITY: iPhone Developer
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Performance:
          APS_ENVIRONMENT: development
          CODE_SIGN_IDENTITY: iPhone Developer
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG GARYX_PERFORMANCE_TESTING
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: "$(IOS_APP_PROVISIONING_PROFILE_SPECIFIER)"
  GaryxRecentThreadsWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Widget/GaryxRecentThreadsWidget
      - path: Sources/GaryxMobileCore/GaryxAvatarCache.swift
      - path: Sources/GaryxMobileCore/GaryxMobileIdentityPresentation.swift
      - path: Sources/GaryxMobileCore/GaryxMobileWidgetData.swift
      - path: Sources/GaryxMobileCore/GaryxMobileUsageWidgetData.swift
      - path: Sources/GaryxMobileCore/GaryxTypography.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile.RecentThreadsWidget
        PRODUCT_NAME: GaryxRecentThreadsWidget
        INFOPLIST_FILE: Widget/GaryxRecentThreadsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/GaryxRecentThreadsWidget/GaryxRecentThreadsWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: "$(IOS_WIDGET_PROVISIONING_PROFILE_SPECIFIER)"
  GaryxMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/GaryxMobileTests
    dependencies:
      - target: GaryxMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile.Tests
        PRODUCT_NAME: GaryxMobileTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.9
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Gary X.app/Gary X"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_TARGET_NAME: GaryxMobile
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
  GaryxMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: UITests/GaryxMobileUITests
    dependencies:
      - target: GaryxMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile.UITests
        PRODUCT_NAME: GaryxMobileUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.9
        TEST_TARGET_NAME: GaryxMobile
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
