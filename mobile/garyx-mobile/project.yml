name: GaryxMobile
options:
  bundleIdPrefix: com.garyx
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
schemes:
  GaryxMobile:
    build:
      targets:
        GaryxMobile: all
    run:
      config: Debug
  GaryxMobileScrollPerformance:
    build:
      targets:
        GaryxMobile: all
        GaryxMobileUITests: [test]
    test:
      config: Debug
      targets:
        - GaryxMobileUITests
targets:
  GaryxMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/GaryxMobile
      - path: Sources/GaryxMobileCore
    dependencies:
      - target: GaryxRecentThreadsWidget
        embed: true
    resources:
      - App/GaryxMobile/Assets.xcassets
      - App/GaryxMobile/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile
        PRODUCT_NAME: Gary X
        INFOPLIST_FILE: App/GaryxMobile/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/GaryxMobile/GaryxMobile.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: "$(IOS_APP_PROVISIONING_PROFILE_SPECIFIER)"
  GaryxRecentThreadsWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget/GaryxRecentThreadsWidget
      - path: Sources/GaryxMobileCore/GaryxMobileIdentityPresentation.swift
      - path: Sources/GaryxMobileCore/GaryxMobileWidgetData.swift
      - path: Sources/GaryxMobileCore/GaryxMobileUsageWidgetData.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile.RecentThreadsWidget
        PRODUCT_NAME: GaryxRecentThreadsWidget
        INFOPLIST_FILE: Widget/GaryxRecentThreadsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/GaryxRecentThreadsWidget/GaryxRecentThreadsWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: "$(IOS_WIDGET_PROVISIONING_PROFILE_SPECIFIER)"
  GaryxMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests/GaryxMobileUITests
    dependencies:
      - target: GaryxMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garyx.mobile.UITests
        PRODUCT_NAME: GaryxMobileUITests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 5.9
        TEST_TARGET_NAME: GaryxMobile
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
